<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator - Built for Digital Heroes</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #2c3e50; }
        .display-box {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 1rem;
            min-height: 24px;
            word-break: break-all;
            position: relative;
        }
        .controls { margin-bottom: 1.5rem; text-align: left; }
        .control-group { margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        label { font-size: 0.9rem; font-weight: 600; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 1rem; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-generate { background-color: #007bff; color: white; }
        .btn-generate:hover { background-color: #0056b3; }
        .btn-copy { background-color: #28a745; color: white; }
        .btn-copy:hover { background-color: #1e7e34; }
        
        .hero-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #6f42c1;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .hero-btn:hover { background-color: #5a32a3; }
        
        .footer { margin-top: 20px; font-size: 0.8rem; color: #666; }
        .strength-bar { height: 5px; background: #ddd; margin-top: 10px; border-radius: 3px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; transition: width 0.3s, background 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔒 Secure Password Generator</h1>
    
    <div class="display-box" id="passwordOutput">Click Generate</div>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <p id="strengthText" style="font-size: 0.8rem; margin-top: 5px;">Strength: -</p>

    <div class="controls">
        <div class="control-group">
            <label>Length: <span id="lengthVal">12</span></label>
        </div>
        <input type="range" id="lengthRange" min="6" max="32" value="12" oninput="document.getElementById('lengthVal').innerText = this.value">
        
        <div class="control-group">
            <label>Include Uppercase (A-Z)</label>
            <input type="checkbox" id="uppercase" checked>
        </div>
        <div class="control-group">
            <label>Include Numbers (0-9)</label>
            <input type="checkbox" id="numbers" checked>
        </div>
        <div class="control-group">
            <label>Include Symbols (!@#)</label>
            <input type="checkbox" id="symbols" checked>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-generate" onclick="generatePassword()">Generate Password</button>
        <button class="btn-copy" onclick="copyPassword()">Copy</button>
    </div>

    <a href="https://digitalheroesco.com" class="hero-btn" target="_blank">Built for Digital Heroes</a>

    <div class="footer">
        <p>By <strong>Aniket Verma</strong></p>
        <p>Email: <a href="mailto:aniketverma5212@gmail.com">aniketverma5212@gmail.com</a></p>
    </div>
</div>

<script>
    function generatePassword() {
        const length = document.getElementById('lengthRange').value;
        const hasUpper = document.getElementById('uppercase').checked;
        const hasNumbers = document.getElementById('numbers').checked;
        const hasSymbols = document.getElementById('symbols').checked;

        const lower = "abcdefghijklmnopqrstuvwxyz";
        const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const nums = "0123456789";
        const syms = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

        let chars = lower;
        if (hasUpper) chars += upper;
        if (hasNumbers) chars += nums;
        if (hasSymbols) chars += syms;

        let password = "";
        for (let i = 0; i < length; i++) {
            password += chars.charAt(Math.floor(Math.random() * chars.length));
        }

        document.getElementById('passwordOutput').innerText = password;
        calculateStrength(password);
    }

    function calculateStrength(pwd) {
        let score = 0;
        if (pwd.length > 8) score++;
        if (pwd.length > 12) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;

        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        
        if (score < 2) {
            fill.style.width = "20%"; fill.style.background = "#dc3545"; text.innerText = "Strength: Weak";
        } else if (score < 4) {
            fill.style.width = "60%"; fill.style.background = "#ffc107"; text.innerText = "Strength: Medium";
        } else {
            fill.style.width = "100%"; fill.style.background = "#28a745"; text.innerText = "Strength: Strong";
        }
    }

    function copyPassword() {
        const pwd = document.getElementById('passwordOutput').innerText;
        if (pwd === "Click Generate") return;
        navigator.clipboard.writeText(pwd).then(() => {
            alert("Password copied to clipboard!");
        });
    }
</script>

</body>
</html>
